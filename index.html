<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunaria</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      background:#fdf7f5;
      color:#4a3d3d;
    }

    header{
      text-align:center;
      padding:40px 20px 20px;
    }

    .logo{
      width:90px;
      height:90px;
      object-fit:cover;
      border-radius:50%;
      margin-bottom:15px;
    }

    h1{
      font-family:'Playfair Display', serif;
      font-size:3rem;
      letter-spacing:2px;
    }

    .subtitle{
      color:#8b7474;
      margin-top:10px;
      font-size:1rem;
    }

    .gallery{
      max-width:1100px;
      margin:40px auto;
      padding:0 20px;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .gallery img{
      width:100%;
      height:320px;
      object-fit:cover;
      border-radius:18px;
      transition:0.3s;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .gallery img:hover{
      transform:scale(1.02);
    }

    .button-container{
      text-align:center;
      margin:50px 20px 70px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:#d8b4b4;
      color:white;
      text-decoration:none;
      border-radius:40px;
      font-size:1rem;
      transition:0.3s;
    }

    .btn:hover{
      background:#c59b9b;
      transform:translateY(-2px);
    }

    footer{
      text-align:center;
      padding:25px;
      color:#9a8a8a;
      font-size:0.9rem;
    }

    @media(max-width:600px){
      h1{
        font-size:2.3rem;
      }

      .gallery img{
        height:260px;
      }
    }
  </style>
</head>
<body>

  <header>
    <!-- CAMBIA logo.png por tu logo -->
    <img src="logo.png" alt="Logo Lunaria" class="logo">

    <h1>Lunaria</h1>

    <p class="subtitle">
      Flores para momentos especiales ✿
    </p>
  </header>

  <section class="gallery">

    <!-- CAMBIA las imágenes por las tuyas -->

    <img src="img1.jpg" alt="Flores 1">
    <img src="img2.jpg" alt="Flores 2">
    <img src="img3.jpg" alt="Flores 3">
    <img src="img4.jpg" alt="Flores 4">
    <img src="img5.jpg" alt="Flores 5">
    <img src="img6.jpg" alt="Flores 6">

  </section>

  <div class="button-container">
    <a 
      href="https://forms.office.com/r/sLtGsUqsRi" 
      target="_blank"
      class="btn">
      Hacer pedido
    </a>
  </div>

  <footer>
    © 2026 Lunaria
  </footer>

</body>
</html>
